name: Build Multiarch Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.2.0)'
        required: true
        default: '0.2.0'
      source_repo:
        description: 'Source repository'
        required: true
        default: 'xnet-admin-1/aiope-agentx'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            deb_arch: amd64
            rpm_arch: x86_64
          - goos: linux
            goarch: arm64
            deb_arch: arm64
            rpm_arch: aarch64
          - goos: linux
            goarch: arm
            goarm: "7"
            deb_arch: armhf
            rpm_arch: armv7hl
    steps:
      - name: Checkout apt repo
        uses: actions/checkout@v4

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.source_repo }}
          path: source
          token: ${{ secrets.SOURCE_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: source/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          cd source
          go build -ldflags="-s -w -X main.version=${{ github.event.inputs.version }} -X main.commit=$(git rev-parse --short HEAD) -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../aiope ./cmd/aiope/

      - name: Build .deb package
        run: |
          PKG=aiope
          VER=${{ github.event.inputs.version }}
          ARCH=${{ matrix.deb_arch }}
          DIR="${PKG}_${VER}_${ARCH}"
          mkdir -p "${DIR}/DEBIAN"
          mkdir -p "${DIR}/usr/local/bin"
          cp aiope "${DIR}/usr/local/bin/aiope"
          chmod 755 "${DIR}/usr/local/bin/aiope"
          cat > "${DIR}/DEBIAN/control" <<EOF
          Package: ${PKG}
          Version: ${VER}
          Architecture: ${ARCH}
          Maintainer: XNet-NGO <admin@xnet.ngo>
          Section: utils
          Priority: optional
          Description: AI assistant in your terminal
           AIOPE provides an AI-powered terminal assistant with tool use,
           agent orchestration, and a built-in web interface.
          EOF
          # Remove leading spaces from heredoc
          sed -i 's/^          //' "${DIR}/DEBIAN/control"
          dpkg-deb --build "${DIR}"

      - name: Build .rpm package
        run: |
          sudo apt-get install -y rpm
          PKG=aiope
          VER=${{ github.event.inputs.version }}
          ARCH=${{ matrix.rpm_arch }}
          mkdir -p rpmbuild/{SPECS,SOURCES,BUILD,RPMS,SRPMS}
          cp aiope "rpmbuild/SOURCES/aiope"
          cat > rpmbuild/SPECS/aiope.spec <<EOF
          Name: ${PKG}
          Version: ${VER}
          Release: 1
          Summary: AI assistant in your terminal
          License: Proprietary

          %description
          AIOPE provides an AI-powered terminal assistant with tool use,
          agent orchestration, and a built-in web interface.

          %install
          mkdir -p %{buildroot}/usr/local/bin
          cp %{_sourcedir}/aiope %{buildroot}/usr/local/bin/aiope
          chmod 755 %{buildroot}/usr/local/bin/aiope

          %files
          /usr/local/bin/aiope
          EOF
          sed -i 's/^          //' rpmbuild/SPECS/aiope.spec
          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
            --target "${ARCH}-linux" \
            -bb rpmbuild/SPECS/aiope.spec

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: "*.deb"

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.rpm_arch }}
          path: rpmbuild/RPMS/**/*.rpm

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout apt repo
        uses: actions/checkout@v4

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys

      - name: Download all deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          path: debs/
          merge-multiple: true

      - name: Download all rpm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rpm-*
          path: rpms/
          merge-multiple: true

      - name: Update APT repository structure
        run: |
          rm -rf pool/main/*.deb
          mkdir -p pool/main
          cp debs/*.deb pool/main/

          for arch in amd64 arm64 armhf; do
            dir="dists/stable/main/binary-${arch}"
            mkdir -p "${dir}"
            dpkg-scanpackages --arch "${arch}" pool/main > "${dir}/Packages"
            gzip -9c "${dir}/Packages" > "${dir}/Packages.gz"
          done

          cd dists/stable
          cat > Release <<EOF
          Architectures: amd64 arm64 armhf
          Codename: stable
          Components: main
          Date: $(date -Ru)
          Description: APT repository for AIOPE packages
          Label: AIOPE
          Origin: XNet-NGO
          Suite: stable
          EOF
          sed -i 's/^          //' Release

          {
            echo "MD5Sum:"
            find main -type f | sort | while read f; do
              printf " %s %16d %s\n" "$(md5sum "$f" | cut -d' ' -f1)" "$(stat -c%s "$f")" "$f"
            done
            echo "SHA256:"
            find main -type f | sort | while read f; do
              printf " %s %16d %s\n" "$(sha256sum "$f" | cut -d' ' -f1)" "$(stat -c%s "$f")" "$f"
            done
          } >> Release

      - name: Sign APT Release
        run: |
          cd dists/stable
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release

      - name: Export public key
        run: |
          gpg --armor --export > public-key.asc

      - name: Set up signed RPM repository
        run: |
          sudo apt-get install -y createrepo-c rpm
          mkdir -p rpm-repo
          find rpms/ -name "*.rpm" -exec cp {} rpm-repo/ \;

          # Sign each RPM
          cat > ~/.rpmmacros <<MACROS
          %_gpg_name XNet-NGO <admin@xnet.ngo>
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} --digest-algo sha256 %{__plaintext_filename}
          MACROS
          for rpm_file in rpm-repo/*.rpm; do
            rpmsign --addsign "$rpm_file"
          done

          cd rpm-repo
          createrepo_c .

      - name: Update README
        run: |
          cat > README.md <<'EOF'
          # XNet-NGO APT & RPM Repository

          Signed Debian/Ubuntu and RPM packages for XNet-NGO tools.

          ## Available packages

          - `aiope` — amd64, arm64, armhf (deb) / x86_64, aarch64, armv7hl (rpm)

          ## Debian/Ubuntu (APT) — signed

          ```bash
          curl -fsSL https://raw.githubusercontent.com/XNet-NGO/apt/main/public-key.asc | sudo gpg --dearmor -o /usr/share/keyrings/xnet-ngo-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/xnet-ngo-archive-keyring.gpg] https://raw.githubusercontent.com/XNet-NGO/apt/main stable main" | sudo tee /etc/apt/sources.list.d/xnet-ngo.list
          sudo apt update
          sudo apt install aiope
          ```

          ## RHEL/Fedora/openSUSE (RPM) — signed

          ```bash
          sudo rpm --import https://raw.githubusercontent.com/XNet-NGO/apt/main/public-key.asc
          sudo tee /etc/yum.repos.d/xnet-ngo.repo <<REPO
          [xnet-ngo]
          name=XNet-NGO
          baseurl=https://raw.githubusercontent.com/XNet-NGO/apt/main/rpm-repo
          enabled=1
          gpgcheck=1
          gpgkey=https://raw.githubusercontent.com/XNet-NGO/apt/main/public-key.asc
          REPO
          sudo dnf install aiope
          ```
          EOF
          sed -i 's/^          //' README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update packages to v${{ github.event.inputs.version }} (signed multiarch deb+rpm)"
          git push
